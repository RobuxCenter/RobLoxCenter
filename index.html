<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CLUB GAMING — PREMIUM STORE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --accent-blue: #007aff; 
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(255, 255, 255, 0.4);
            --text-dark: #1d1d1f; 
            --error-red: #ff3b30;
        }

        /* Main Loader */
        #main-loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 999999; transition: opacity 0.5s; }
        .loader-logo { font-size: 50px; color: var(--accent-blue); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }

        body { 
            margin: 0; font-family: -apple-system, sans-serif; color: var(--text-dark); background: #f5f5f7;
            background-image: radial-gradient(at 0% 0%, hsla(197,100%,85%,1) 0, transparent 50%), radial-gradient(at 100% 0%, hsla(338,100%,85%,1) 0, transparent 50%);
            background-attachment: fixed; min-height: 100vh; overflow-x: hidden;
        }

        /* Banner & Header */
        .system-banner { background: rgba(255,255,255,0.2); backdrop-filter: blur(10px); padding: 12px; text-align: center; font-size: 13px; font-weight: 900; position: sticky; top: 0; z-index: 1001; border-bottom: 1px solid var(--glass-border); }
        header { padding: 15px 20px; background: rgba(255,255,255,0.4); backdrop-filter: blur(20px); border-bottom: 1px solid var(--glass-border); position: sticky; top: 43px; z-index: 100; text-align: center; }
        .logo-icon { display: inline-block; background: linear-gradient(45deg, var(--accent-blue), #5ac8fa); color: white; padding: 10px; border-radius: 14px; font-size: 20px; }

        .search-box { max-width: 500px; margin: 15px auto 0; position: relative; padding: 0 20px; }
        .search-box input { width: 100%; padding: 12px 40px; border-radius: 12px; border: 1px solid var(--glass-border); background: rgba(255,255,255,0.6); outline: none; box-sizing: border-box; }
        .search-box i { position: absolute; left: 35px; top: 50%; transform: translateY(-50%); color: #888; }

        /* Grid */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 15px; padding: 20px; max-width: 1000px; margin: 0 auto; }
        .card { 
            background: var(--glass-bg); backdrop-filter: blur(8px); padding: 12px; border-radius: 24px; border: 1px solid var(--glass-border); 
            text-align: center; opacity: 0; transform: translateY(20px); transition: 0.5s forwards; cursor: pointer;
        }
        .card.is-visible { opacity: 1; transform: translateY(0); }
        .card img { width: 100%; aspect-ratio: 1/1; border-radius: 18px; object-fit: cover; }
        .card h3 { margin: 8px 0 2px; font-size: 11px; font-weight: 800; }
        .dl-count { font-size: 9px; color: #666; font-weight: 700; }

        /* Detail Popup */
        #popup-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background: rgba(255,255,255,0.9); backdrop-filter: blur(15px); z-index: 9999; overflow-y: auto; }
        .container { max-width: 600px; margin: 0 auto; padding: 60px 20px 20px; }
        .close-btn { position: fixed; top: 15px; right: 20px; font-size: 26px; cursor: pointer; z-index: 10002; }
        .m-header { text-align: center; margin-bottom: 25px; }
        .m-header img { width: 110px; height: 110px; border-radius: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }

        .dl-btns-row { display: flex; gap: 10px; margin: 20px 0; }
        .dl-btn { flex: 1; padding: 15px; border-radius: 15px; font-weight: 900; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 12px; transition: 0.2s; }
        .and-btn { background: #28cd41; color: #fff; }
        .ios-btn { background: #000; color: #fff; }

        .ss-list { display: flex; gap: 15px; margin-top: 20px; overflow-x: auto; scroll-snap-type: x mandatory; padding-bottom: 10px; }
        .ss-list::-webkit-scrollbar { display: none; }
        .ss-list img { width: 85%; flex-shrink: 0; scroll-snap-align: center; border-radius: 15px; border: 1px solid var(--glass-border); }

        /* Smart Locker UI */
        #cpa-locker-ui {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(20px); z-index: 200000;
            align-items: center; justify-content: center;
        }
        .locker-card {
            width: 90%; max-width: 380px; background: var(--glass-bg);
            border: 1px solid var(--glass-border); border-radius: 30px; padding: 30px;
            text-align: center; box-shadow: 0 25px 50px rgba(0,0,0,0.1);
        }
        .game-icon-locker { width: 90px; height: 90px; border-radius: 20px; margin-bottom: 15px; }
        
        .progress-bar { width: 100%; height: 10px; background: #eee; border-radius: 10px; overflow: hidden; margin: 15px 0; }
        .progress-fill { width: 0%; height: 100%; background: var(--accent-blue); transition: width 0.1s linear; }
        
        /* Buttons */
        .btn-verify-main {
            background: var(--accent-blue); color: white; border: none; padding: 15px;
            border-radius: 15px; font-weight: bold; width: 100%; font-size: 16px; cursor: pointer;
            display: none; align-items: center; justify-content: center; gap: 10px;
        }

        /* Error Message Style */
        #error-msg { display: none; color: var(--error-red); font-weight: 800; margin-top: 15px; font-size: 13px; }

        #offers-list { display: none; margin-top: 15px; }
        .offer-item {
            background: #fff; border-radius: 12px; padding: 12px; margin-bottom: 10px;
            display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--glass-border);
        }
        .offer-text { font-size: 12px; color: #333; font-weight: 700; text-align: left; flex: 1; }
        .offer-btn { background: var(--accent-blue); color: white; padding: 6px 12px; border-radius: 20px; font-size: 10px; font-weight: bold; }

        .wa-float { position: fixed; bottom: 25px; right: 25px; background: #25D366; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 30px; z-index: 10000; }
    </style>
</head>
<body>

<div id="main-loader"><div class="loader-logo"><i class="fa-solid fa-gamepad"></i></div></div>

<div class="system-banner" id="bannerWave"></div>

<header>
    <div class="logo-icon"><i class="fa-solid fa-gamepad"></i></div>
    <h1 style="margin:5px 0 0; font-size:20px; font-weight:900;">CLUB GAMING</h1>
    <div class="search-box"><i class="fa-solid fa-magnifying-glass"></i><input type="text" id="gameSearch" placeholder="Search premium games..." onkeyup="searchGames()"></div>
</header>

<div class="grid" id="game-grid"></div>

<div id="popup-overlay">
    <div class="close-btn" onclick="closeP()">✕</div>
    <div class="container">
        <div class="m-header"><img id="m-img" src=""><h2 id="m-title" style="margin-top:10px;"></h2></div>
        <div class="dl-btns-row">
            <button class="dl-btn and-btn" onclick="checkDevice('Android')"><i class="fa-brands fa-android"></i> ANDROID</button>
            <button class="dl-btn ios-btn" onclick="checkDevice('iOS')"><i class="fa-brands fa-apple"></i> iOS DEVICE</button>
        </div>
        <div class="ss-list" id="m-ss"></div>
    </div>
</div>

<div id="cpa-locker-ui">
    <div class="locker-card">
        <div class="close-btn" style="position:relative; top:0; right:0; float:right;" onclick="closeLocker()">✕</div>
        <img id="lock-img" src="" class="game-icon-locker">
        <div style="font-weight: 900; font-size: 18px;" id="lock-title"></div>
        
        <div id="step-loading">
            <div class="progress-bar"><div id="p-fill" class="progress-fill"></div></div>
            <div id="p-percent" style="font-size: 11px; color: #888;">0% - Initializing...</div>
        </div>

        <button id="btn-ready" class="btn-verify-main" onclick="showOffers()">
            <i class="fa-solid fa-shield-check"></i> VERIFY
        </button>

        <div id="error-msg">
            <i class="fa-solid fa-circle-xmark"></i> ACCESS DECLINED!<br>
            <span style="font-size: 10px; font-weight: normal;">Your device is not compatible with this version.</span>
        </div>

        <div id="offers-list">
            <div style="font-weight: 900; margin-bottom: 10px; color: var(--accent-blue);">VERIFICATION REQUIRED</div>
            <div class="offer-item" onclick="window.open('CPA_LINK_1')"><div class="offer-text">Complete 1 task to start!</div><div class="offer-btn">VERIFY</div></div>
            <div class="offer-item" onclick="window.open('CPA_LINK_2')"><div class="offer-text">أدخل رقمك لتأكيد الهوية!</div><div class="offer-btn">VERIFY</div></div>
        </div>
    </div>
</div>

<a href="https://wa.me/212690587889" target="_blank" class="wa-float"><i class="fa-brands fa-whatsapp"></i></a>

<script>
    const games = [
        { t: 'Lord Voldemort', i: 'https://i.ibb.co/hRHJ4QCN/Chat-GPT-Image-Mar-11-2026-12-51-27-AM.png', dls: 1540, ss: ['https://i.ibb.co/r2fKKfp8/Whats-App-Image-2026-03-11-at-05-53-30.jpg', 'https://i.ibb.co/gMbFY5PZ/Whats-App-Image-2026-03-11-at-05-53-29.jpg'] },
        { t: 'GTA 5 Mobile', i: 'https://i.ibb.co/ccqsLxrm/gta-logo.jpg', dls: 2841, ss: ['https://i.ibb.co/JWfVvjCz/gta-2.jpg', 'https://i.ibb.co/tph5ytTX/gta-1.jpg'] },
        { t: 'Assetto Corsa Mobile', i: 'https://i.ibb.co/cczBTgw3/Assetto-Corsa-Mobile.webp', dls: 1421, ss: ['https://i.ibb.co/gZNXy7y7/Assetto-Corsa-Mobile-2.jpg'] },
        { t: 'BeamNG.drive Mobile', i: 'https://i.ibb.co/8nS1jHYP/Beam-NG-drive-Mobile.jpg', dls: 1150, ss: ['https://i.ibb.co/8LsrJvcW/Beam-NG-drive-Mobile-22.avif'] },
        { t: 'Euro Truck Sim 2', i: 'https://i.ibb.co/4Z7WQcYz/Euro-Truck-Simulator-2.jpg', dls: 2552, ss: ['https://i.ibb.co/1fqWd7VX/Euro-Truck-Sim-2.avif'] },
        { t: 'The Crew Motorfest', i: 'https://i.ibb.co/KpSY4gBM/the-crew-motorfest.jpg', dls: 1278, ss: ['https://i.ibb.co/RGQLbrxT/The-Crew-Motorfest-3.jpg'] },
        { t: 'Battlefield 6 Mobile', i: 'https://i.ibb.co/1YkdWt8J/Battlefield-6-Mobile.jpg', dls: 2684, ss: ['https://i.ibb.co/9FpwGmX/Battlefield-6-Mobile-1.jpg'] },
        { t: 'CarX Drift Racing 2', i: 'https://i.ibb.co/tPzrNZpQ/Car-X-Drift-Racing-2-klogo.jpg', dls: 1894, ss: ['https://i.ibb.co/99QtPCrw/Car-X-Drift-Racing-1.webp'] },
        { t: 'Naruto STORM Mobile', i: 'https://i.ibb.co/whZKHGDB/Naruto-STORM-Mobile.jpg', dls: 1743, ss: ['https://i.ibb.co/4wNBtrwt/Naruto-STORM-Mobile2.jpg'] },
        { t: 'FNAF Remastered', i: 'https://i.ibb.co/CKx04GLt/Five-Nights-at-Freddy-s.jpg', dls: 2950, ss: ['https://i.ibb.co/p6XCNRwK/Five-Nights-at-Freddy-s1.png'] },
        { t: 'The Last of Us Mobile', i: 'https://i.ibb.co/Kcx9pv99/The-Last-of-Us-Mobile.jpg', dls: 1412, ss: ['https://i.ibb.co/bR6m6Hvq/The-Last-of-Us-Mobile-2.jpg'] },
        { t: 'Hollow Knight Silksong', i: 'https://i.ibb.co/xSKyVDLP/Hollow-Knight-Silksong.jpg', dls: 1330, ss: ['https://i.ibb.co/4ZBVfgts/Hollow-Knight-Silksong-2.webp'] },
        { t: 'Red Dead Redem 2', i: 'https://i.ibb.co/wFmYBkfz/Red-Dead-Redemption-2.jpg', dls: 1095, ss: ['https://i.ibb.co/Z1csQY68/Red-Dead-Redem-2-2.webp'] },
        { t: 'Once Human Mobile', i: 'https://i.ibb.co/RTqgxVt3/Once-Human-mobile.jpg', dls: 2116, ss: ['https://i.ibb.co/TxTFLN5d/Once-Human-Mobile-1.jpg'] },
        { t: 'FC 24 Mobile Mod', i: 'https://i.ibb.co/L7pY89f7/Whats-App-Image-2026-03-12-at-03-47-06.jpg', dls: 3200, ss: ['https://i.ibb.co/L7pY89f7/Whats-App-Image-2026-03-12-at-03-47-06.jpg'] }
    ];

    window.onload = () => { setTimeout(() => { document.getElementById('main-loader').style.opacity = '0'; setTimeout(() => document.getElementById('main-loader').style.display='none', 500); }, 1000); render(); };

    function render(data = games) {
        const grid = document.getElementById('game-grid'); grid.innerHTML = '';
        data.forEach((g, idx) => {
            const card = document.createElement('div'); card.className = 'card'; card.onclick = () => openP(idx);
            card.innerHTML = `<img src="${g.i}"><h3>${g.t}</h3><div class="dl-count">${g.dls.toLocaleString()} DL</div>`;
            grid.appendChild(card); setTimeout(() => card.classList.add('is-visible'), idx * 50);
        });
    }

    function openP(idx) {
        const g = games[idx];
        document.getElementById('m-title').innerText = g.t;
        document.getElementById('m-img').src = g.i;
        const ssBox = document.getElementById('m-ss'); ssBox.innerHTML = '';
        g.ss.forEach(s => ssBox.innerHTML += `<img src="${s}">`);
        document.getElementById('popup-overlay').style.display = 'block';
    }

    // SMART DEVICE CHECK
    function checkDevice(platform) {
        const userAgent = navigator.userAgent || navigator.vendor || window.opera;
        let isAndroid = /android/i.test(userAgent);
        let isIOS = /iPad|iPhone|iPod/.test(userAgent) && !window.MSStream;

        document.getElementById('lock-title').innerText = document.getElementById('m-title').innerText;
        document.getElementById('lock-img').src = document.getElementById('m-img').src;
        document.getElementById('cpa-locker-ui').style.display = 'flex';
        
        // Reset
        document.getElementById('step-loading').style.display = 'block';
        document.getElementById('btn-ready').style.display = 'none';
        document.getElementById('error-msg').style.display = 'none';
        document.getElementById('offers-list').style.display = 'none';

        // Check compatibility
        if ((platform === 'Android' && !isAndroid) || (platform === 'iOS' && !isIOS)) {
            setTimeout(() => {
                document.getElementById('step-loading').style.display = 'none';
                document.getElementById('error-msg').style.display = 'block';
            }, 1500);
        } else {
            // Success: Proceed to Verify
            let w = 0;
            const fill = document.getElementById('p-fill');
            const per = document.getElementById('p-percent');
            const intv = setInterval(() => {
                if(w >= 100) { clearInterval(intv); document.getElementById('step-loading').style.display = 'none'; document.getElementById('btn-ready').style.display = 'flex'; }
                else { w++; fill.style.width = w+'%'; per.innerText = w+'% - Checking Device...'; }
            }, 30);
        }
    }

    function showOffers() { document.getElementById('btn-ready').style.display = 'none'; document.getElementById('offers-list').style.display = 'block'; }
    function closeLocker() { document.getElementById('cpa-locker-ui').style.display = 'none'; }
    function closeP() { document.getElementById('popup-overlay').style.display = 'none'; }
    function searchGames() { const q = document.getElementById('gameSearch').value.toLowerCase(); render(games.filter(g => g.t.toLowerCase().includes(q))); }

    const bTxt = "⚠️ SYSTEM STATUS: ALL SERVERS OPERATIONAL — ENJOY FREE ACCESS";
    bTxt.split("").forEach((l, i) => { const s = document.createElement('span'); s.innerText = l===" "?"\u00A0":l; s.style.animationDelay = (i*0.05)+"s"; document.getElementById('bannerWave').appendChild(s); });
</script>
</body>
</html>
